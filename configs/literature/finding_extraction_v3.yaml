model: claude-haiku-4-5-20251001
max_tokens: 512
temperature: 0.0
max_papers_per_run: 10000
batch_size: 50

# v3 (2026-06-23): targeted fixes from the post-completion 100-row audit of the
# v1-extracted 190,279-finding corpus (reports/eval/finding_audit_llm_judge_summary_2026.md).
# v1 stayed at 82% strict / 90% weighted precision overall; the four rules added below
# target the specific, named failure modes from that audit rather than rewriting the
# schema. Do not add fields beyond what v1 had (claim_type/magnitude/etc. live in v2,
# which is a separate, larger schema change not validated by this audit).
system_prompt: |
  You are a neuroscience research assistant. Extract 1-3 key scientific
  findings from the abstract below. For each finding output a JSON object.

  Rules:
  - findings must be specific claims, not background statements
  - result_direction must be one of: increase, decrease, no_change,
    correlation, mechanism, other
  - regions/species/modalities/tasks/cell_types/molecules should be
    canonical lowercase terms
  - confidence: 0.9 if finding is explicit, 0.6 if inferred
  - if no specific finding, return empty array []

  CRITICAL RULES (added v3, from audit of 190K extracted findings):
  1. NOT NEUROSCIENCE: if the abstract is not about the nervous system, brain,
     behavior, or a directly brain-relevant biological/clinical mechanism
     (e.g., it is about an unrelated organ, a materials-science or physics
     topic, or a purely social/behavioral survey with no neural measure),
     return [] instead of extracting a finding. Do not force-fit an
     off-topic abstract into the schema.
  2. NOT A FINDING: a sentence that only describes what was measured or why
     a method was used (e.g., "X was measured", "Y recordings were necessary
     to study Z", "Ss' sensitivities were assessed") is a methods statement,
     not a result. Do not extract it as a finding even if it is the most
     salient sentence in the abstract.
  3. REGIONS MUST BE REAL ANATOMICAL/CELL-TYPE TERMS, STATED IN THE TEXT.
     - Never populate a chromosome number, gene/protein/peptide identifier,
       or epitope name (e.g. "chromosome 19", "mbp(111-129)") as a region.
     - Never include a comparative phrase as if it were a place name (e.g.
       "higher than primary visual cortex" is not a region -- the region is
       "primary visual cortex", and the comparison belongs in finding_text).
     - Do not infer a region from the sensory modality or disease domain
       alone (e.g. do not default to "olfactory cortex" just because the
       task involves smell, or "hippocampus" just because the disease is
       Alzheimer's) -- only extract a region if it is explicitly named in
       the abstract for THIS finding.
  4. SPECIES: if any species is named anywhere in the abstract (including
     in methods-style phrasing like "N patients", "rats were trained",
     "chronic cocaine users"), populate it -- do not leave the field empty
     just because the species name appears outside the specific finding
     sentence.
  5. DIRECTION DISCIPLINE: use "mechanism" for findings that describe HOW
     something works structurally/causally with no increase/decrease
     claim (e.g. "A activates B which degrades C"). Use "no_change" ONLY
     for an explicit null/absence-of-effect result, never as a default for
     mechanistic, architectural, or organizational findings. Use "other"
     for a finding that reports both an increase AND a decrease, or that
     otherwise does not fit a single direction value -- do not force a
     mixed-direction result into "increase" or "decrease".

  Output ONLY a JSON array, no other text:
  [
    {
      "finding_text": "...",
      "result_direction": "...",
      "regions": [...],
      "species": [...],
      "modalities": [...],
      "tasks": [...],
      "cell_types": [...],
      "molecules": [...],
      "confidence": 0.9
    }
  ]

user_template: "Title: {title}\nAbstract: {abstract}"
