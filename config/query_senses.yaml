# Query Sense Disambiguation Configuration
# ==========================================
#
# This file defines the different scientific meanings (senses) of
# overloaded terms in neuroscience queries. The goal is to distinguish
# between different meanings of the same word to improve search precision.
#
# Example: "delay" can mean:
#   - delay_discounting: Intertemporal choice, reward valuation
#   - motor_delay: Delayed reach, instructed delay period
#   - signal_delay: Neural propagation delay, conduction latency
#   - working_memory_delay: WM maintenance during delay period
#
# Each sense has:
#   - positive_terms: Terms that indicate this sense
#   - required_context_any: At least one must appear for sense to apply
#   - negative_terms: Terms that contradict this sense
#   - exclusive_senses: Mutually exclusive meanings
#   - associated_affordances: Analysis affordances for this sense
#   - associated_tasks: Experimental tasks associated with this sense

delay:
  delay_discounting:
    label: "Delay discounting / Intertemporal choice"
    description: "Temporal discounting of reward value, choosing between immediate and delayed rewards"
    positive_terms:
      - "delay discounting"
      - "temporal discounting"
      - "intertemporal choice"
      - "delayed reward"
      - "immediate reward"
      - "impulsive choice"
      - "impulsivity"
      - "discounting rate"
      - "hyperbolic discounting"
      - "k parameter"
      - "discount factor"
      - "sooner smaller"
      - "larger later"
      - "delay aversion"
      - "time preference"
    required_context_any:
      - "reward"
      - "choice"
      - "value"
      - "magnitude"
      - "decision"
      - "prefer"
      - "option"
      - "impuls"
    negative_terms:
      - "reach"
      - "grasp"
      - "motor"
      - "movement"
      - "propagation"
      - "conduction"
      - "latency"
      - "synaptic"
      - "working memory"
      - "maintenance"
      - "retention"
    exclusive_senses:
      - "motor_delay"
      - "signal_delay"
      - "working_memory_delay"
    associated_affordances:
      - "delay_discounting_modeling"
      - "q_learning"
    associated_tasks:
      - "delay_discounting"
      - "intertemporal_choice"
      - "impulsivity"

  motor_delay:
    label: "Motor delay / Instructed delay"
    description: "Delay period in motor tasks, delayed reach, movement preparation"
    positive_terms:
      - "delayed reach"
      - "instructed delay"
      - "motor planning"
      - "movement preparation"
      - "delay period activity"
      - "preparatory activity"
      - "reach to grasp"
      - "delayed saccade"
      - "go cue"
      - "hold period"
    required_context_any:
      - "reach"
      - "grasp"
      - "motor"
      - "movement"
      - "saccade"
      - "arm"
      - "hand"
      - "target"
    negative_terms:
      - "discount"
      - "value"
      - "impulsive"
      - "magnitude"
      - "propagation"
      - "memory"
    exclusive_senses:
      - "delay_discounting"
      - "signal_delay"
    associated_affordances:
      - "motor_decoding"
      - "choice_decoding"
    associated_tasks:
      - "delayed_reach"
      - "center_out"
      - "instructed_delay"

  signal_delay:
    label: "Signal propagation delay"
    description: "Neural signal propagation time, conduction delay, latency"
