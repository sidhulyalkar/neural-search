# Neural Search Behavioral Task Ontology v0.1
# Purpose: Broad but practical ontology for experiment-aware neural dataset search.
# Each task should support extraction, filtering, retrieval explanation, dataset-card generation, and notebook suggestions.

tasks:
  # ---------------------------------------------------------------------------
  # Decision making and cognitive control
  # ---------------------------------------------------------------------------
  - id: go_nogo
    label: Go/NoGo
    category: cognitive_control
    definition: >
      A task in which subjects respond to Go cues and withhold responses to NoGo cues,
      commonly used to study response inhibition, action selection, and impulsivity.
    synonyms:
      - go/no-go
      - go nogo
      - go no-go
      - response inhibition
      - action withholding
      - inhibitory control
      - nogo task
    common_events:
      - cue_onset
      - go_cue
      - nogo_cue
      - response
      - lick
      - lever_press
      - nose_poke
      - reward
      - omission
      - false_alarm
      - hit
      - miss
      - correct_rejection
    relevant_modalities:
      - calcium_imaging
      - extracellular_ephys
      - neuropixels
      - eeg
      - ecog
      - behavior_video
      - fiber_photometry
    relevant_regions:
      - mPFC
      - ACC
      - OFC
      - striatum
      - motor_cortex
      - basal_ganglia
    suggested_analyses:
      - event_aligned_activity
      - response_inhibition_decoding
      - hit_false_alarm_comparison
      - reaction_time_analysis
      - trial_outcome_decoding

