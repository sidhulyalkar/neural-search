    synonyms: [grip force, grasp force, pinch force, force output, isometric force]
  - id: saccade
    label: Saccade
    synonyms: [saccade, eye movement, saccadic, prosaccade, antisaccade]
  - id: fixation
    label: Fixation
    synonyms: [fixation, gaze, eye position, fixation point]
  - id: pursuit
    label: Smooth Pursuit
    synonyms: [smooth pursuit, pursuit, tracking eye movement]
  - id: spindle
    label: Sleep Spindle
    synonyms: [sleep spindle, spindle, sigma activity, thalamocortical spindle]
  - id: sharp_wave_ripple
    label: Sharp-Wave Ripple
    synonyms: [sharp-wave ripple, SWR, ripple, hippocampal ripple, memory replay]
  - id: high_frequency_oscillation
    label: High-Frequency Oscillation
    synonyms: [high frequency oscillation, HFO, fast ripple, pathological HFO, ripple band]
  - id: speech_onset
    label: Speech Onset
    synonyms: [speech onset, vocalization onset, voice onset, utterance start]
  - id: word_boundary
    label: Word Boundary
    synonyms: [word boundary, word onset, word offset, word segmentation]
  - id: sentence_onset
    label: Sentence Onset
    synonyms: [sentence onset, sentence start, utterance onset]

# Analysis affordances - capabilities supported by normalized datasets
analysis_affordances:
  - id: fmri_glm_analysis
    label: fMRI GLM Analysis
    definition: >
      First-level or task-contrast general linear model analysis over
      BIDS-formatted fMRI/BOLD datasets with event or condition metadata.
    required_signals:
      - fmri_bold
      - bids_events
      - task_conditions
    helpful_signals:
      - contrast_metadata
      - design_matrix
      - derivative_maps
    typical_outputs:
      - beta_maps
      - contrast_maps
      - statistical_maps
      - design_matrix
    relevant_tasks:
      - n_back
      - go_nogo
      - stop_signal_task
      - visual_decision_making

  - id: q_learning_model_fitting
    label: Q-Learning Model Fitting
    definition: >
      Fitting reinforcement learning models with action values, learning rates,
      and temporal difference updates to behavioral choice data.
    required_signals:
      - choice_data
      - reward_outcome
      - trial_structure
    helpful_signals:
      - reaction_time
      - confidence_rating
      - block_structure
    typical_outputs:
      - learning_rate
      - inverse_temperature
      - q_values
      - model_comparison
    relevant_tasks:
      - bandit_task
      - reversal_learning
      - two_alternative_forced_choice
      - delay_discounting

  - id: temporal_difference_modeling
    label: Temporal Difference Modeling
    definition: >
      Computing reward prediction errors by comparing predicted and actual
      outcomes at each time step, modeling value updating dynamics.
    required_signals:
      - reward_timing
      - trial_events
      - neural_activity
    helpful_signals:
      - cue_timing
      - value_cues
    typical_outputs:
      - prediction_error_timecourse
      - value_signals
      - td_error
    relevant_tasks:
      - classical_conditioning
      - temporal_difference_learning
      - reversal_learning
      - bandit_task

  - id: choice_decoding
    label: Choice Decoding
    definition: >
      Decoding trial-by-trial choices or decisions from neural population
      activity using classification or regression approaches.
    required_signals:
      - neural_data
      - choice_labels
      - trial_alignment
    helpful_signals:
      - reaction_time
      - confidence
      - stimulus_features
    typical_outputs:
      - decoding_accuracy
      - choice_probability
      - decision_variable
    relevant_tasks:
      - two_alternative_forced_choice
      - reversal_learning
      - visual_decision_making
      - bandit_task

  - id: motor_decoding
    label: Motor Decoding
    definition: >
      Decoding movement parameters such as direction, velocity, position,
      or force from neural activity.
    required_signals:
      - neural_data
      - kinematics
      - movement_timing
    helpful_signals:
      - emg
      - force_data
      - joint_angles
    typical_outputs:
      - decoded_trajectory
      - velocity_estimate
      - direction_tuning
      - decoding_r2
    relevant_tasks:
      - reaching
      - center_out_reaching
      - grasping
      - joystick_task
      - closed_loop_control

  - id: speech_decoding
    label: Speech Decoding
    definition: >
      Decoding speech content, phonemes, words, or articulatory features
      from neural activity during speech production or perception.
    required_signals:
      - neural_data_speech_areas
      - speech_labels
      - timing_alignment
    helpful_signals:
      - audio_recording
      - phoneme_boundaries
      - articulatory_features
    typical_outputs:
      - phoneme_accuracy
      - word_error_rate
      - articulatory_decoding
    relevant_tasks:
      - speech_production
      - speech_perception
      - speech_bci
      - picture_naming

  - id: seizure_detection
    label: Seizure Detection
    definition: >
      Automated detection of seizure events, seizure onset, and seizure
      propagation patterns from neural recordings.
    required_signals:
      - neural_data
      - seizure_annotations
    helpful_signals:
      - clinical_events
      - medication_timing
      - behavioral_markers
    typical_outputs:
      - seizure_onset_time
      - seizure_duration
      - onset_zone
      - sensitivity_specificity
    relevant_tasks:
      - seizure_monitoring
      - interictal_monitoring

  - id: sleep_stage_classification
    label: Sleep Stage Classification
    definition: >
      Classification of sleep stages (wake, N1, N2, N3, REM) from
      polysomnographic or neural signals.
    required_signals:
      - eeg_data
      - sleep_annotations
    helpful_signals:
      - eog_data
      - emg_data
      - ecg_data
    typical_outputs:
      - hypnogram
      - stage_probabilities
      - transition_matrix
      - sleep_metrics
    relevant_tasks:
      - sleep_wake
      - sleep_staging

  - id: event_aligned_activity
    label: Event-Aligned Activity
    definition: >
      Aligning neural activity to behavioral or stimulus events to compute
      peri-event time histograms, event-related potentials, or trial averages.
    required_signals:
      - neural_data
      - event_timestamps
    helpful_signals:
      - trial_labels
      - event_types
      - continuous_behavior
    typical_outputs:
      - psth
      - erp
      - event_triggered_average
      - latency_analysis
    relevant_tasks:
      - go_nogo
      - classical_conditioning
      - visual_decision_making
      - oddball

  - id: population_dynamics
    label: Population Dynamics
    definition: >
      Analyzing collective neural activity patterns using dimensionality
      reduction, state-space models, or neural trajectory analysis.
    required_signals:
      - multi_unit_data
      - trial_structure
    helpful_signals:
      - behavior_labels
      - continuous_kinematics
      - task_conditions
    typical_outputs:
      - neural_trajectories
      - latent_dimensions
      - state_space_model
      - dynamical_system_fit
    relevant_tasks:
      - reaching
      - motor_sequence
      - decision_making
      - working_memory

  - id: functional_connectivity
    label: Functional Connectivity
    definition: >
      Computing statistical dependencies between neural signals across
      brain regions or electrode sites.
    required_signals:
      - multi_region_data
      - region_labels
    helpful_signals:
      - anatomical_locations
      - task_epochs
      - frequency_bands
    typical_outputs:
      - connectivity_matrix
      - coherence
      - granger_causality
      - network_metrics
    relevant_tasks:
      - resting_state
      - sleep_wake
      - seizure_monitoring
      - language_comprehension

  - id: pose_estimation
    label: Pose Estimation
    definition: >
      Extracting body part positions, skeletal pose, or movement trajectories
      from video data using deep learning or marker tracking.
    required_signals:
      - behavior_video
    helpful_signals:
      - multiple_camera_views
      - marker_data
      - depth_data
    typical_outputs:
      - keypoint_coordinates
      - pose_skeleton
      - movement_trajectories
      - behavioral_syllables
    relevant_tasks:
      - open_field
      - social_interaction
      - free_behavior
      - locomotion

  - id: neural_behavior_correlation
    label: Neural-Behavior Correlation
    definition: >
      Computing correlations or predictive relationships between neural
      activity and continuous behavioral variables.
    required_signals:
      - neural_data
      - behavioral_timeseries
      - temporal_alignment
    helpful_signals:
      - multiple_behaviors
      - neural_region_labels
      - task_epochs
    typical_outputs:
      - correlation_coefficients
      - encoding_model
      - variance_explained
      - tuning_curves
    relevant_tasks:
      - locomotion
      - free_behavior
      - spatial_navigation
      - pupil_arousal

  - id: spike_sorting
    label: Spike Sorting
    definition: >
      Separating action potentials from different neurons in extracellular
      recordings based on waveform features.
    required_signals:
      - raw_extracellular_data
    helpful_signals:
      - probe_geometry
      - spike_times_initial
    typical_outputs:
      - spike_times
      - unit_ids
      - waveforms
      - cluster_quality_metrics
    relevant_tasks:
      - any_ephys_task

  - id: lfp_spectral_analysis
    label: LFP Spectral Analysis
    definition: >
      Computing power spectra, spectrograms, and frequency-band activity
      from local field potentials.
    required_signals:
      - lfp_data
    helpful_signals:
      - event_timestamps
      - behavioral_epochs
      - region_labels
    typical_outputs:
      - power_spectrum
      - spectrogram
      - band_power_timeseries
      - phase_amplitude_coupling
    relevant_tasks:
      - sleep_wake
      - resting_state
      - locomotion
      - seizure_monitoring

  - id: trial_outcome_prediction
    label: Trial Outcome Prediction
    definition: >
      Predicting trial success, error, or specific outcomes from pre-trial
      or early-trial neural activity.
    required_signals:
      - neural_data
      - trial_outcomes
      - trial_timing
    helpful_signals:
      - behavioral_state
      - arousal_measures
      - history_effects
    typical_outputs:
      - prediction_accuracy
      - outcome_probability
      - neural_predictors
    relevant_tasks:
      - go_nogo
      - two_alternative_forced_choice
      - reaching

  - id: aperiodic_spectral_parameterization
    label: Aperiodic Spectral Parameterization
    definition: >
      Parameterizing a power spectrum into an aperiodic ("1/f") background
      (offset, exponent, optional knee) plus periodic oscillatory peaks,
      using methods such as FOOOF/specparam or IRASA. Descriptive only: the
      aperiodic exponent is not a validated direct measurement of
      excitation/inhibition balance or any single mechanism.
    required_signals:
      - continuous_neural_timeseries
      - electrophysiology_or_eeg_or_meg_modality
    helpful_signals:
      - sampling_rate_metadata
      - channel_or_probe_metadata
      - task_state_or_resting_state_label
      - brain_region_metadata
    typical_outputs:
      - aperiodic_exponent
      - aperiodic_offset
      - knee_frequency
      - periodic_peaks
      - spectral_slope
    relevant_tasks:
      - resting_state
      - sleep_wake
      - seizure_monitoring
    query_synonyms:
      - aperiodic
      - 1/f
      - one over f
      - spectral slope
      - power law
      - broadband
      - E/I balance
      - excitation inhibition
      - intrinsic timescale
      - neural timescale
      - offset
      - knee
      - FOOOF
      - specparam
      - IRASA
      - periodic vs aperiodic
      - working_memory
