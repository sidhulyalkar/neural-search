source_targets:
  - id: macaque_mt_single_unit
    priority: critical
    rationale: Exact macaque area MT/MST single-unit visual-motion datasets are not represented in the local normalized corpus yet.
    desired_labels:
      species:
        - macaque
      modalities:
        - extracellular_ephys
        - spikes
      brain_regions:
        - area_mt
        - mst
        - visual_cortex
      tasks:
        - visual_motion
    candidate_sources:
      - CRCNS visual cortex / motion datasets
      - DANDI search for macaque MT single-unit
      - Neurodata Without Borders examples from visual motion physiology papers
