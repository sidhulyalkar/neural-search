graph_reasoning:
  # Entity Relationship Queries (4 queries)
  - id: gr_rel_001
    query: "datasets from labs that published in Nature Neuroscience 2023"
    natural_language: "Find datasets from labs with recent high-impact publications"
    reasoning_path:
      - find_papers: {journal: "Nature Neuroscience", year: 2023}
      - extract_labs: from_papers
      - find_datasets: from_labs
    expected_outputs:
      - lab_names
      - paper_dois
      - dataset_ids
    difficulty: hard
    priority: MEDIUM

  - id: gr_rel_002
    query: "datasets that share authors with Svoboda lab publications"
    natural_language: "Datasets from researchers affiliated with Svoboda lab"
    reasoning_path:
      - find_lab: "Svoboda"
      - extract_authors: from_lab_papers
      - find_datasets: with_overlapping_authors
    difficulty: hard
    priority: LOW

  - id: gr_rel_003
    query: "datasets citing same methods papers as IBL"
    natural_language: "Datasets using similar methodologies to IBL"
    reasoning_path:
      - find_datasets: {consortium: "IBL"}
      - extract_methods_papers: from_datasets
      - find_other_datasets: citing_same_methods
    difficulty: hard
    priority: LOW

  - id: gr_rel_004
    query: "datasets from institutions with >5 DANDI contributions"
    natural_language: "Datasets from prolific DANDI contributors"
    reasoning_path:
      - aggregate_institutions: from_dandi_datasets
      - filter: contribution_count > 5
      - find_datasets: from_filtered_institutions
    difficulty: medium
    priority: LOW

  # Multi-Hop Queries (3 queries)
  - id: gr_hop_001
    query: "find collaborators datasets based on my hippocampus paper"
    natural_language: "Datasets from potential collaborators via citation network"
    reasoning_path:
      - input: user_paper
      - find_citations: papers_citing_user_paper
      - extract_authors: from_citing_papers
      - find_datasets: from_those_authors
    requires_user_input: true
    difficulty: hard
    priority: LOW

  - id: gr_hop_002
    query: "datasets using same analysis code as visual cortex studies"
    natural_language: "Find datasets sharing code dependencies"
    reasoning_path:
      - find_papers: {brain_region: "visual_cortex"}
      - extract_code_repos: from_papers
      - find_other_papers: using_same_repos
      - find_datasets: from_those_papers
    difficulty: hard
    priority: LOW

  - id: gr_hop_003
    query: "mouse analogs of human clinical datasets"
    natural_language: "Mouse datasets studying same phenomena as human clinical"
    reasoning_path:
      - find_datasets: {species: "human", domain: "clinical"}
      - extract_tasks: from_datasets
      - find_mouse_datasets: with_equivalent_tasks
    difficulty: hard
    priority: MEDIUM

  # Aggregate Reasoning Queries (3 queries)
  - id: gr_agg_001
    query: "most commonly recorded brain regions in decision making"
    natural_language: "Which regions are most studied in decision-making datasets?"
    reasoning_path:
      - find_datasets: {task_category: "decision_making"}
      - aggregate: brain_regions
      - rank: by_frequency
    expected_outputs:
      - region_frequencies
      - top_regions
    difficulty: medium
    priority: MEDIUM

  - id: gr_agg_002
    query: "trending modalities in BCI research 2022-2024"
    natural_language: "Which recording modalities are gaining popularity in BCI?"
    reasoning_path:
      - find_datasets: {task_category: "bci", year_range: [2022, 2024]}
      - aggregate: modalities_by_year
      - compute: trend_analysis
    difficulty: medium
    priority: LOW

  - id: gr_agg_003
    query: "data standard adoption by domain"
    natural_language: "NWB vs BIDS adoption across scientific domains"
    reasoning_path:
      - find_datasets: all
