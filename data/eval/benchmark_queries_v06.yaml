# =============================================================================
# EVALUATION CRITERIA
# =============================================================================

evaluation:
  precision_metrics:
    - name: precision_at_5
      description: "Fraction of top-5 results that are relevant"
      target: ">= 0.7 for easy, >= 0.5 for hard"

    - name: constraint_satisfaction
      description: "Fraction of results satisfying all specified constraints"
      target: "1.0 for adversarial queries"

    - name: hard_negative_rejection
      description: "Fraction of hard negatives correctly excluded"
      target: ">= 0.9"

  recall_metrics:
    - name: label_recall_at_10
      description: "Fraction of expected labels found in top-10"
      target: ">= 0.7"

    - name: dataset_recall
      description: "Fraction of expected datasets found (when IDs specified)"
      target: ">= 0.8"

  relevance_metrics:
    - name: ndcg_at_10
      description: "Normalized discounted cumulative gain"
      target: ">= 0.6"

    - name: mrr
      description: "Mean reciprocal rank of first relevant result"
      target: ">= 0.5"

  coverage_metrics:
    - name: domain_coverage
      description: "Queries covering each scientific domain"
      target: "All domains represented"

    - name: modality_coverage
      description: "Queries covering each recording modality"
      target: "Major modalities represented"
