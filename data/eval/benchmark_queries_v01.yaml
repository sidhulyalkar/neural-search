    expected_modalities: ["electrophysiology", "calcium_imaging"]
    expected_behaviors: ["licking", "lever_press", "button_press"]
    difficulty: "easy"
    priority: "HIGH"

  - id: "dm_gonogo_002"
    query: "prefrontal cortex go nogo inhibition"
    natural_language: "Go/no-go with prefrontal cortex recordings"
    expected_tasks: ["go_nogo"]
    expected_brain_regions: ["mPFC", "PFC", "prefrontal"]
    expected_behaviors: ["response_inhibition"]
    difficulty: "medium"
    priority: "HIGH"

  - id: "dm_gonogo_003"
    query: "mouse go nogo calcium imaging"
    natural_language: "Mouse calcium imaging during go/no-go"
    expected_tasks: ["go_nogo"]
    expected_species: ["mouse", "Mus musculus"]
    expected_modalities: ["calcium_imaging", "two_photon"]
    difficulty: "medium"
    priority: "MEDIUM"

  # Reversal Learning (4 queries)
  - id: "dm_reversal_001"
