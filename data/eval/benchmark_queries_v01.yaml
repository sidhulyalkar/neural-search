    expected_tasks: ["reversal_learning"]
    expected_brain_regions: ["OFC", "orbitofrontal"]
    expected_behaviors: ["choice", "reward_consumption"]
    difficulty: "medium"
    priority: "HIGH"

  - id: "dm_reversal_003"
    query: "probabilistic reversal learning striatum"
    natural_language: "Probabilistic reversal with striatal recordings"
    expected_tasks: ["probabilistic_reversal"]
    expected_brain_regions: ["striatum", "NAc", "dorsal_striatum"]
    difficulty: "hard"
    priority: "MEDIUM"

  - id: "dm_reversal_004"
    query: "rodent flexible behavior rule switching"
    natural_language: "Rodent cognitive flexibility and rule switching data"
    expected_tasks: ["reversal_learning", "set_shifting", "rule_switching"]
    expected_species: ["mouse", "rat"]
    difficulty: "hard"
    priority: "MEDIUM"

  # Delay Discounting / Intertemporal Choice (3 queries)
  - id: "dm_delay_001"
    query: "delay discounting neural"
    natural_language: "Delay discounting task with neural recordings"
    expected_tasks: ["delay_discounting", "intertemporal_choice"]
    expected_behaviors: ["choice", "waiting"]
    difficulty: "easy"
    priority: "HIGH"

  - id: "dm_delay_002"
    query: "intertemporal choice prefrontal cortex"
    natural_language: "PFC recordings during intertemporal choice"
    expected_tasks: ["intertemporal_choice", "delay_discounting"]
    expected_brain_regions: ["mPFC", "OFC", "ACC"]
    difficulty: "medium"
    priority: "MEDIUM"

  - id: "dm_delay_003"
    query: "impulsivity waiting fiber photometry"
    natural_language: "Fiber photometry during impulsivity/waiting tasks"
    expected_tasks: ["delay_discounting", "waiting_task"]
    expected_modalities: ["fiber_photometry"]
    expected_behaviors: ["waiting", "impulsive_choice"]
    difficulty: "hard"
    priority: "LOW"

  # Two-Alternative Forced Choice (3 queries)
  - id: "dm_2afc_001"
    query: "two alternative forced choice neural"
    natural_language: "2AFC task with neural recordings"
    expected_tasks: ["two_alternative_forced_choice", "2AFC"]
    expected_behaviors: ["choice", "decision"]
    difficulty: "easy"
    priority: "HIGH"

  - id: "dm_2afc_002"
    query: "evidence accumulation decision making"
    natural_language: "Evidence accumulation during decision making"
    expected_tasks: ["evidence_accumulation", "2AFC"]
    expected_behaviors: ["perceptual_decision"]
    difficulty: "medium"
    priority: "MEDIUM"

  - id: "dm_2afc_003"
    query: "reaction time confidence neural"
    natural_language: "Reaction time and confidence with neural data"
    expected_tasks: ["2AFC", "confidence_judgment"]
    expected_behaviors: ["reaction_time", "confidence_report"]
    difficulty: "hard"
    priority: "LOW"

  # Probabilistic Learning (2 queries)
  - id: "dm_prob_001"
    query: "probabilistic reward learning"
    natural_language: "Probabilistic reward learning with neural data"
    expected_tasks: ["probabilistic_learning", "reward_learning"]
    expected_behaviors: ["choice", "reward_prediction"]
