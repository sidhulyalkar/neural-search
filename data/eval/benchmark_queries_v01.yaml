# Benchmark Queries v0.1 - Corpus Expansion Sprint
# 50 queries covering decision-making, motor control, visual decision-making, BCI, and clinical neurophysiology

# =============================================================================
# DECISION-MAKING DOMAIN (15 queries)
# =============================================================================

decision_making:
  # Go/No-Go Task (3 queries)
