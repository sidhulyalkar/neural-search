    natural_language: "Find reversal learning datasets with electrophysiology"
    expected_tasks: ["reversal_learning", "probabilistic_reversal"]
    expected_modalities: ["electrophysiology", "ephys"]
    difficulty: "easy"
    priority: "HIGH"

  - id: "dm_reversal_002"
    query: "orbitofrontal cortex reward reversal"
