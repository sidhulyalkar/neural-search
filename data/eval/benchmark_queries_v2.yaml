# =============================================================================
# ANNOTATION SCHEMA
# =============================================================================

annotation_schema:
  relevance_levels:
    - 3: highly_relevant  # Dataset directly matches all query constraints
    - 2: relevant         # Dataset matches most constraints with minor gaps
    - 1: marginally_relevant  # Dataset partially matches, significant gaps
    - 0: not_relevant     # Dataset does not match query intent

  annotation_fields:
    - relevance: int  # 0-3
    - confidence: float  # 0.0-1.0 annotator confidence
    - hard_negative_violation: bool  # True if excluded item appears
    - constraint_satisfaction:
        species_match: bool
        modality_match: bool
        task_match: bool
        region_match: bool
        affordance_match: bool
    - notes: str  # Free text explanation
