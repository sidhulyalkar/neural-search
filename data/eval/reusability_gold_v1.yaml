# Reusability Gold v1 Benchmark
# ==============================
#
# A benchmark that tests scientific dataset reusability, not just label overlap.
# Each query evaluates whether a dataset can support a specific analysis.
#
# Categories:
# - ambiguity: Queries with overloaded terms requiring sense disambiguation
# - affordance: Queries targeting specific analysis capabilities
# - cross_modal: Queries spanning modalities or species
# - natural_language: Realistic messy user queries
# - exact_lookup: Precise dataset or paper lookups
#
# Graded relevance:
# - 3: Perfect match - dataset fully supports the analysis
# - 2: Good match - dataset mostly supports the analysis
# - 1: Partial match - some support, missing key elements
# - 0: Not relevant - wrong sense, missing requirements, or hard negative

version: "1.0"
name: "Reusability Gold v1"
description: "Benchmark for experimental reusability, not just topical similarity"
created: "2026-05-27"

queries:
  # =============================================================================
  # Ambiguity Category: Overloaded terms requiring disambiguation
  # =============================================================================

  - id: rg_v1_001
    query: "Find datasets suitable for fitting delay discounting models from trial-level behavior"
    category: ambiguity
    intent: analysis_reusability
    constructs:
      - delay_discounting
      - intertemporal_choice
    must_have:
      - trial_id
      - choice
      - reward_magnitude
      - delay_duration
      - outcome
    should_have:
      - reaction_time
      - subject_id
      - session_id
    hard_negative_senses:
      - motor_delay
      - signal_propagation_delay
      - working_memory_delay
    notes: "True delay discounting requires reward-delay tradeoff variables, not generic delay."

  - id: rg_v1_002
