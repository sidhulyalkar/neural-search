# =============================================================================
# Metrics Configuration
# =============================================================================

metrics:
  primary:
    - precision_at_5
    - ndcg_at_10
    - mrr
  secondary:
    - hard_negative_violation_rate
    - claim_support_rate
    - missing_requirement_rate
    - affordance_accuracy

evaluation_notes: |
  This benchmark evaluates experimental reusability, not just topical similarity.

  Key evaluation principles:
  1. A result is relevant only if it can actually support the target analysis
  2. Hard negatives (wrong sense of overloaded terms) should be penalized
  3. Missing required variables reduce relevance score
  4. Affordance support should be validated, not assumed from description

  Graded relevance interpretation:
  - 3: Dataset has all must-have variables and supports the analysis
  - 2: Dataset has most must-have variables, minor gaps
  - 1: Dataset partially supports analysis, key elements missing
  - 0: Not relevant - wrong sense, missing critical requirements
