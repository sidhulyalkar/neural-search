# Neural Search Adversarial Benchmark Queries v0.3
# =================================================
# These queries test scientific reasoning, ambiguity handling, exclusions,
# and analysis affordance matching. Failures are expected initially and
# should reveal gaps rather than fail the build.
# Created: 2026-05-23

benchmark_queries:
  # =========================================================================
  # HARD NEGATIVE / EXCLUSION QUERIES (7 queries)
  # =========================================================================

  - id: adv_001
    query: "Find OFC reversal learning datasets, but exclude fMRI and pure behavior-only studies."
    expected_tasks: [reversal_learning]
    expected_regions_any: [ofc, orbitofrontal_cortex]
    hard_negative_modalities: [fmri]
    expected_modalities_any: [calcium_imaging, extracellular_ephys, fiber_photometry, neuropixels]
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Tests exclusion parsing + modality filtering. Results should have neural recordings, not fMRI."
    rationale: "OFC reversal learning is a common paradigm but users often need specific modalities."

  - id: adv_002
    query: "Find dopamine reward prediction error datasets but not seizure monitoring, sleep, or auditory tasks."
    expected_behaviors: [reward_prediction, dopamine, reward]
    expected_regions_any: [vta, snc, nucleus_accumbens, striatum]
    hard_negative_dataset_ids: []
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Scientific ambiguity and explicit task exclusions."
    rationale: "Users want reward-related data without clinical monitoring confounds."

  - id: adv_003
    query: "Find visual cortex recordings from mouse NOT using EEG or fMRI."
    expected_species: [mouse]
    expected_regions_any: [visual_cortex, v1, primary_visual_cortex]
    hard_negative_modalities: [eeg, fmri]
    expected_modalities_any: [calcium_imaging, neuropixels, extracellular_ephys, two_photon]
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Tests multi-constraint exclusion with species + region + modality."
    rationale: "Mouse visual neuroscience typically uses invasive recordings, not EEG/fMRI."

  - id: adv_004
    query: "Find primate motor cortex reaching data without Utah arrays."
    expected_species: [macaque, rhesus, non_human_primate]
    expected_tasks: [reaching, center_out_reaching, grasping]
    expected_regions_any: [motor_cortex, m1, primary_motor_cortex]
    hard_negative_modalities: [utah_array]
    expected_modalities_any: [neuropixels, extracellular_ephys, ecog]
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Uncommon exclusion within expected domain."
    rationale: "Some analyses require specific electrode configurations."

  - id: adv_005
    query: "Find human speech datasets with iEEG but NOT fMRI studies."
    expected_species: [human]
    expected_tasks: [speech, language, auditory_processing]
    expected_modalities_any: [ieeg, ecog]
    hard_negative_modalities: [fmri]
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Clinical iEEG speech is distinct from fMRI language studies."
    rationale: "High temporal resolution required for speech decoding."

  - id: adv_006
    query: "Find reversal learning datasets using electrophysiology, exclude calcium imaging and fiber photometry."
    expected_tasks: [reversal_learning, probabilistic_reversal_learning]
    expected_modalities_any: [extracellular_ephys, neuropixels]
    hard_negative_modalities: [calcium_imaging, fiber_photometry]
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Tests preference for spike-based modalities over optical."
    rationale: "Some analyses need spike timing not available in calcium."

  - id: adv_007
    query: "Find hippocampus spatial navigation NOT from virtual reality or head-fixed paradigms."
    expected_tasks: [spatial_navigation, place_cell_recording]
    expected_regions_any: [hippocampus, ca1, ca3]
    expected_behaviors: [navigation, spatial_position]
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Paradigm-level exclusion (VR vs real-world)."
    rationale: "Place cell properties differ between real and virtual navigation."

  # =========================================================================
  # ANALYSIS AFFORDANCE QUERIES (8 queries)
  # =========================================================================

  - id: adv_008
    query: "Find datasets suitable for fitting Q-learning models where choices, rewards, and trial outcomes are explicitly available."
    expected_tasks: [reversal_learning, probabilistic_learning, delay_discounting]
    expected_behaviors: [choice, reward, trial_outcome]
    expected_analysis_any: [q_learning_modeling, value_estimation, temporal_difference]
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Tests analysis affordance detection for RL modeling."
    rationale: "Q-learning requires specific behavioral structure not always present."

  - id: adv_009
    query: "Find motor cortex reaching datasets with continuous kinematics, not just event labels."
    expected_tasks: [reaching, center_out_reaching]
    expected_regions_any: [motor_cortex, primary_motor_cortex, m1]
    expected_behaviors: [kinematics, position, velocity]
    expected_analysis_any: [motor_decoding, trajectory_prediction]
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Tests analysis affordance for continuous behavioral signals."
    rationale: "Motor decoding requires continuous kinematics, not just trial events."

  - id: adv_010
    query: "Find datasets that support trial-aligned neural activity analysis with explicit trial structure."
    expected_behaviors: [trial_start, stimulus_onset, response, trial_outcome]
