# Metadata
metadata:
  version: "0.3.0"
  total_queries: 35
  categories:
    hard_negative_exclusion: 7
    analysis_affordance: 8
    ambiguous_natural_language: 6
    missing_metadata_awareness: 5
    paper_dataset_linking: 4
    complex_multi_constraint: 5
  notes: |
    These queries are intentionally challenging and many are expected to fail initially.
    Failures expose gaps in:
    - Exclusion/negative constraint handling
    - Analysis affordance detection
    - Natural language understanding
    - Metadata completeness awareness
    - Paper-dataset linking

    Track failures as improvement opportunities, not build failures.
