    rationale: "Connectivity needs sorted units, not raw data."

  - id: adv_015
    query: "Find datasets that could support reinforcement learning model fitting but may be missing reward timing."
    expected_tasks: [reversal_learning, delay_discounting, probabilistic_learning]
    expected_behaviors: [choice, reward]
    expected_analysis_any: [q_learning_modeling, temporal_difference]
    minimum_precision_at_5: 0.0
    minimum_label_recall_at_10: 0.0
    notes: "Tests partial affordance with known gaps."
    rationale: "RL modeling needs precise reward timing often missing."

