# Neural Search Demo Corpus
# These are scientifically plausible demo datasets for search testing.
# source_type: curated_demo = plausible structure, synthetic metadata
# Real public datasets should use source_type: real_public

datasets:
  # ============================================================================
  # EXISTING DEMO DATASETS (migrated from seed)
  # ============================================================================

  - dataset_id: DEMO_GONOGO_CALCIUM
    title: Demo Go/NoGo calcium imaging dataset
    description: Mouse mPFC calcium imaging during a Go/NoGo response inhibition task with lick, hit, false alarm, cue onset, reward, and omission events.
    source_type: curated_demo
    source_name: demo
    species: [mouse]
    brain_regions: [medial_prefrontal_cortex, mPFC, prelimbic_cortex]
    modalities: [calcium_imaging, two_photon, behavior_video]
    tasks: [go_nogo, response_inhibition]
    behavioral_events: [lick, reward, omission, correct, false_alarm, hit, miss, cue_onset]
    analysis_goals: [event_aligned_activity, trial_outcome_decoding, response_inhibition_decoding]
    data_standards: [NWB]
    file_formats: [nwb, h5]
    keywords: [cognitive control, inhibitory control, action withholding, licking behavior]
    scientific_relevance: Response inhibition paradigm with clear trial structure and neural correlates
    expected_queries: [go nogo, response inhibition, lick behavior, mPFC calcium]

  - dataset_id: DEMO_REVERSAL_EPHYS
    title: Demo reversal learning electrophysiology dataset
    description: Mouse OFC and striatum extracellular electrophysiology during probabilistic reversal learning with choice, reward omission, reversal points, and trial outcomes.
    source_type: curated_demo
    source_name: demo
    species: [mouse]
    brain_regions: [orbitofrontal_cortex, OFC, striatum, dorsal_striatum, ventral_striatum]
    modalities: [extracellular_ephys, spikes, LFP]
    tasks: [reversal_learning, probabilistic_reversal_learning]
    behavioral_events: [choice, reward, omission, error, reversal_point, trial_outcome]
    analysis_goals: [reward_prediction_error, value_estimation, latent_state_modeling, q_learning]
    data_standards: [NWB]
    file_formats: [nwb]
    keywords: [reward learning, cognitive flexibility, value representation, dopamine]
    scientific_relevance: Classic reversal learning paradigm for studying flexible decision-making
    expected_queries: [reversal learning, reward omission, OFC, striatum]

  - dataset_id: DEMO_DELAY_DISCOUNTING
    title: Demo delay discounting behavior and neural dataset
    description: Rat mPFC and nucleus accumbens fiber photometry during delay discounting with intertemporal choice, offer onset, delay period, immediate reward, delayed reward, and reaction time.
    source_type: curated_demo
    source_name: demo
    species: [rat]
    brain_regions: [medial_prefrontal_cortex, mPFC, nucleus_accumbens, ventral_striatum]
    modalities: [fiber_photometry, behavior_video]
    tasks: [delay_discounting, intertemporal_choice]
    behavioral_events: [choice, reward, reaction_time, delay_period, offer_onset]
    analysis_goals: [subjective_value_modeling, impulsivity_index, temporal_discounting]
    data_standards: [BIDS]
    file_formats: [nwb, csv]
    keywords: [impulsivity, temporal discounting, dopamine, reward anticipation]
    scientific_relevance: Intertemporal choice paradigm for studying value and impulsivity
    expected_queries: [delay discounting, fiber photometry, reward choice, impulsivity]

