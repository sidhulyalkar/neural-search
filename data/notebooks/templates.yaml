  - id: reversal_learning_basic
    title: Reversal learning notebook
    description: Reversal learning analysis notebook with reward/omission, reversal, win-stay lose-shift, and Q-learning recipe cells.
    required_features:
      tasks_any: [reversal_learning]
      has_trials: true
    recipes: [reversal_learning_basic]
    cells: []

  - id: go_nogo_basic
    title: Go/NoGo notebook
    description: Go/NoGo analysis notebook with cue alignment, hit/false-alarm comparison, and inhibition decoding recipe cells.
    required_features:
      tasks_any: [go_nogo]
      has_trials: true
