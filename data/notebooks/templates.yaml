  - id: reaching_basic
    title: Reaching and BCI notebook
    description: Movement-onset, reach direction, and velocity/kinematic decoding notebook.
    required_features:
      tasks_any: [reaching, center_out_reaching, grasping, joystick_task]
      has_trials: true
    recipes: [reaching_basic]
